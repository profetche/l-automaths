<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="AutoMaths"/>
  <meta name="theme-color" content="#F59E0B"/>
  <title>l'AutoMaths</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- React + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }
    /* iOS PWA safe areas */
    @supports (padding: max(0px)) {
      body { padding-top: max(0px, env(safe-area-inset-top)); }
    }
    #root { width: 100%; max-width: 430px; height: 100dvh; }
    /* Remove phone frame in PWA standalone mode */
    @media (display-mode: standalone) {
      body { background: #E8EAF0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/app.js" data-type="module"></script>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('[AutoMaths] SW registered:', reg.scope);
            // Request notification permission after 30s
            setTimeout(() => {
              if (Notification.permission === 'default') {
                Notification.requestPermission();
              }
            }, 30000);
          })
          .catch(err => console.warn('[AutoMaths] SW error:', err));
      });
    }

    // Install prompt handling
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      // Expose for the app to trigger
      window.__installApp = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          return outcome;
        }
      };
    });
  </script>
</body>
</html>
